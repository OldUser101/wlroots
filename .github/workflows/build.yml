name: CI

on:
    push:
        branches: [ "master" ]
    pull_request:
        branches: [ "master" ]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4
        - uses: cachix/install-nix-action@v26
        - uses: cachix/cachix-action@v17
          with:
              name: olduser101
              authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

        - name: Build wlroots
          run: nix build
